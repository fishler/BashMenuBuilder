<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Retro Terminal Architect v5.0</title>
    <style>
        :root { --p-amber: #FFB000; --p-green: #00FF41; --p-white: #C0C0C0; --p-blue: #00A3FF; }
        body { font-family: 'Courier New', monospace; background: #0d0d0d; color: var(--p-amber); padding: 20px; transition: color 0.3s ease; }
        .container { max-width: 1000px; margin: 0 auto; border: 2px solid currentColor; padding: 25px; background: #050505; }
        
        .selector-box { margin-bottom: 20px; padding: 15px; border: 1px dashed currentColor; }
        .theme-swatches { display: flex; gap: 15px; align-items: center; margin-top: 10px; }
        .swatch { width: 35px; height: 35px; cursor: pointer; border: 2px solid #333; }
        .swatch:hover { border-color: #fff; }
        
        .banner-choice { display: flex; gap: 20px; margin-top: 10px; }
        .banner-option { padding: 10px; border: 1px solid currentColor; cursor: pointer; flex: 1; text-align: center; font-weight: bold; }
        .banner-option.active { background: currentColor; color: #000; }

        .item { border-left: 2px solid currentColor; padding: 15px; margin: 15px 0; background: rgba(255,255,255,0.02); position: relative; }
        .item-cmd { border-left-color: #00FF41; }
        
        button { background: #000; color: currentColor; border: 2px solid currentColor; padding: 8px 15px; cursor: pointer; font-weight: bold; font-family: 'Courier New', monospace; margin: 5px 2px; text-transform: uppercase; }
        button:hover { background: currentColor; color: #000; }
        .btn-action { font-size: 0.8em; border-style: dotted; color: #fff; border-color: #666; }

        input, textarea { background: #000; color: #fff; border: 1px solid currentColor; padding: 8px; font-family: monospace; outline: none; margin-bottom: 5px; }
        textarea { width: 90%; height: 40px; display: block; resize: none; color: #aaa; font-style: italic; }
        
        .remove { color: #ff4444; position: absolute; right: 15px; top: 15px; cursor: pointer; font-weight: bold; border: 1px solid #ff4444; padding: 2px 5px; }
        .btn-build { width: 100%; padding: 20px !important; font-size: 1.2em; border-width: 3px !important; margin-top: 20px !important; }
    </style>
</head>
<body>

<div class="container">
    <h1 style="text-align:center; letter-spacing: 4px;">CONSOLE ARCHITECT v5.0</h1>
    
    <div class="selector-box">
        <strong>1. TERMINAL COLOR:</strong>
        <div class="theme-swatches">
            <div class="swatch" style="background:#FFB000" onclick="setTheme('#FFB000', 'AMBER')"></div>
            <div class="swatch" style="background:#00FF41" onclick="setTheme('#00FF41', 'P3_GREEN')"></div>
            <div class="swatch" style="background:#C0C0C0" onclick="setTheme('#C0C0C0', 'IBM_WHITE')"></div>
            <div class="swatch" style="background:#00A3FF" onclick="setTheme('#00A3FF', 'SOLAR_BLUE')"></div>
            <span id="current-theme-label" style="margin-left: 10px; font-weight: bold;">AMBER</span>
        </div>
    </div>

    <div class="selector-box">
        <strong>2. BANNER STYLE:</strong>
        <div class="banner-choice">
            <div id="btn-orig" class="banner-option active" onclick="setBanner('original')">CLASSIC BLOCK</div>
            <div id="btn-unix" class="banner-option" onclick="setBanner('unix')">UNIX TELETYPE</div>
        </div>
    </div>

    <div id="root-container"></div>
    
    <div style="text-align:center; margin-top: 30px; border-top: 1px solid currentColor; padding-top: 20px;">
        <button onclick="addItem('root-container', 'menu')">+ NEW SUB-MENU</button>
        <button onclick="addItem('root-container', 'command')">+ NEW COMMAND</button>
        <button class="btn-build" onclick="generateRetroScript()">GENERATE 2026 ADMIN SCRIPT (.sh)</button>
    </div>
</div>

<script>
    let idCounter = 1;
    let currentHex = "#FFB000";
    let themeName = "AMBER";
    let selectedBanner = "original";

    function setTheme(hex, name) {
        document.body.style.color = hex;
        currentHex = hex;
        themeName = name;
        document.getElementById('current-theme-label').innerText = name;
    }

    function setBanner(type) {
        selectedBanner = type;
        document.getElementById('btn-orig').className = "banner-option " + (type === 'original' ? 'active' : '');
        document.getElementById('btn-unix').className = "banner-option " + (type === 'unix' ? 'active' : '');
    }

    function addItem(parentId, type, autoCmd = "", autoLabel = "") {
        const id = `item_${idCounter++}`;
        const isMenu = type === 'menu';
        const html = `
            <div class="item ${isMenu ? '' : 'item-cmd'}" id="${id}" data-type="${type}">
                <span class="remove" onclick="document.getElementById('${id}').remove()">X</span>
                <input type="text" placeholder="TITLE (UPPERCASE)" class="title" style="text-transform:uppercase; width: 250px;" value="${autoLabel}">
                <textarea placeholder="Optional description..." class="desc"></textarea>
                ${!isMenu ? `
                    <input type="text" placeholder="BASH COMMAND" class="cmd-text" style="width:70%" value="${autoCmd}">
                    <div style="margin-top:5px">
                        <button class="btn-action" onclick="setTemplate('${id}', 'repo')">REPO</button>
                        <button class="btn-action" onclick="setTemplate('${id}', 'gpg')">GPG</button>
                        <button class="btn-action" onclick="setTemplate('${id}', 'url')">URL</button>
                        <button class="btn-action" onclick="setTemplate('${id}', 'dl')">DOWNLOAD</button>
                    </div>
                ` : ''}
                <div class="children" id="child_${id}" style="margin-left:30px"></div>
                ${isMenu ? `<button onclick="addItem('child_${id}', 'menu')">+ SUB</button><button onclick="addItem('child_${id}', 'command')">+ CMD</button>` : ''}
            </div>`;
        document.getElementById(parentId).insertAdjacentHTML('beforeend', html);
    }

    function setTemplate(id, type) {
        const input = document.getElementById(id).querySelector('.cmd-text');
        const templates = {
            repo: "sudo add-apt-repository -y ppa:USER/REPO && sudo apt update",
            gpg: "wget -qO- URL | sudo gpg --dearmor -o /etc/apt/trusted.gpg.d/KEY.gpg",
            url: "xdg-open 'https://example.com'",
            dl: "curl -L -O 'url-to-file.com'"
        };
        input.value = templates[type];
    }

    function generateRetroScript() {
        let functions = "";
        
        function process(cid, isRoot = false) {
            const container = document.getElementById(cid);
            const items = Array.from(container.children).filter(c => c.classList.contains('item'));
            const title = isRoot ? "MAIN CONSOLE" : (container.parentElement.querySelector('.title').value || "SUBMENU").toUpperCase();
            const fname = isRoot ? "menu_root" : `menu_${cid.replace('child_item_', 'lvl_')}`;

            items.forEach(i => i.dataset.type === 'menu' && process(`child_${i.id}`));

            let body = `${fname}() {\n  while true; do\n    show_banner "${title}"\n`;
            items.forEach((item, idx) => {
                const label = (item.querySelector('.title').value || "OPTION").toUpperCase();
                const desc = item.querySelector('.desc').value;
                body += `    echo -e "  \${THEME}${idx+1})\${NC} ${label}"\n`;
                if(desc) body += `    echo -e "       \${DIM}${desc}\${NC}"\n`;
            });
            body += `    echo -e "\\n  \${THEME}B)\${NC} BACK   \${THEME}M)\${NC} MAIN   \${THEME}E)\${NC} EXIT"\n`;
            body += `    read -p ">> " choice\n    case \${choice,,} in\n`;
            
            items.forEach((item, idx) => {
                if(item.dataset.type === 'menu') body += `      ${idx+1}) menu_lvl_${item.id.replace('item_','')} ;;\n`;
                else body += `      ${idx+1}) ${item.querySelector('.cmd-text').value || "echo"}; read -p "DONE. PRESS ENTER."; ;;\n`;
            });
            
            body += `      b) return ;;\n      m) menu_root ;;\n      e) exit 0 ;;\n    esac\n  done\n}\n\n`;
            functions = body + functions;
        }

        process('root-container', true);

        const r = parseInt(currentHex.slice(1,3), 16), g = parseInt(currentHex.slice(3,5), 16), b = parseInt(currentHex.slice(5,7), 16);
        const bannerCode = selectedBanner === 'original' ? 
            `echo -e "\${THEME}‚ēĒ‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēó"
    echo -e "‚ēĎ      ‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ēó‚Ėą‚Ėą‚ēó‚Ėą‚Ėą‚ēó  ‚Ėą‚Ėą‚ēó‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ēó‚Ėą‚Ėą‚ēó  ‚Ėą‚Ėą‚ēó                     ‚ēĎ"
    echo -e "‚ēĎ      ‚Ėą‚Ėą‚ēĒ‚ēź‚ēź‚ēź‚ēź‚ēĚ‚Ėą‚Ėą‚ēĎ‚ēö‚Ėą‚Ėą‚ēó‚Ėą‚Ėą‚ēĒ‚ēĚ‚Ėą‚Ėą‚ēĒ‚ēź‚ēź‚ēź‚ēź‚ēĚ‚Ėą‚Ėą‚ēĎ ‚Ėą‚Ėą‚ēĒ‚ēĚ                     ‚ēĎ"
    echo -e "‚ēĎ      ‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ēó  ‚Ėą‚Ėą‚ēĎ ‚ēö‚Ėą‚Ėą‚Ėą‚ēĒ‚ēĚ ‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ēó‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ēĒ‚ēĚ                      ‚ēĎ"
    echo -e "‚ēĎ      ‚Ėą‚Ėą‚ēĒ‚ēź‚ēź‚ēĚ  ‚Ėą‚Ėą‚ēĎ ‚Ėą‚Ėą‚ēĒ‚Ėą‚Ėą‚ēó ‚ēö‚ēź‚ēź‚ēź‚ēź‚Ėą‚Ėą‚ēĎ‚Ėą‚Ėą‚ēĒ‚ēź‚Ėą‚Ėą‚ēó                      ‚ēĎ"
    echo -e "‚ēĎ      ‚Ėą‚Ėą‚ēĎ     ‚Ėą‚Ėą‚ēĎ‚Ėą‚Ėą‚ēĒ‚ēĚ ‚Ėą‚Ėą‚ēó‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ēĎ‚Ėą‚Ėą‚ēĎ  ‚Ėą‚Ėą‚ēó                     ‚ēĎ"
    echo -e "‚ēĎ      ‚ēö‚ēź‚ēĚ     ‚ēö‚ēź‚ēĚ‚ēö‚ēź‚ēĚ  ‚ēö‚ēź‚ēĚ‚ēö‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēĚ‚ēö‚ēź‚ēĚ  ‚ēö‚ēź‚ēĚ                     ‚ēĎ"
    echo -e "‚ēĎ                                                              ‚ēĎ"
    echo -e "‚ēĎ  $(echo "$1" | sed 's/./& /g')  ‚ēĎ"
    echo -e "‚ēö‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēĚ\${NC}"` :
            `echo -e "\${THEME}"
    echo " # # # # # # # # # # # # # # # # # # # # # # # # # # # # # #"
    echo " #                                                         #"
    echo " #   $(echo "$1" | tr '[:lower:]' '[:upper:]' | sed 's/./& /g')  #"
    echo " #                                                         #"
    echo " # # # # # # # # # # # # # # # # # # # # # # # # # # # # # #"
    echo -e "\${NC}"`;

        const full = `#!/usr/bin/env bash
# RETRO ARCHITECT GENERATED INTERFACE 2026
# THEME: ${themeName} | BANNER: ${selectedBanner.toUpperCase()}

THEME=$'\\e[38;2;${r};${g};${b}m'
DIM=$'\\e[2;37m'
NC='\\e[0m'

show_banner() {
    clear
    ${bannerCode}
}

${functions}
menu_root`;

        const blob = new Blob([full], {type:'text/x-shellscript'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = "admin_console.sh";
        a.click();
    }

    addItem('root-container', 'menu', '', 'MAIN CONSOLE');
</script>
</body>
</html>
